# Why Nginx? Users hit port 80 (standard HTTP).
# Nginx forwards their requests to Flask on port 5000.
# This hides Flask from the internet and lets Nginx handle
# SSL, compression, and load balancing later.

server {
    listen 80;
    server_name localhost;

    # Forward all requests to Flask
    location / {
        proxy_pass         http://127.0.0.1:5000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_read_timeout    60s;
    }

    # Serve static files directly from Nginx (faster than Flask)
    location /static/ {
        alias /app/static/;
        expires 30d;
    }

    # Health check endpoint (used by Jenkins)
    location /health {
        proxy_pass http://127.0.0.1:5000/health;
        access_log off;
    }
}
